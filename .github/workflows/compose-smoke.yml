name: Compose smoke test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: docker compose -f compose.dev.yaml up -d --build --wait --wait-timeout 30

      - name: Backend responds
        run: curl -sf http://localhost:8080/api/tags

      - name: Frontend responds
        run: curl -sf http://localhost:8080/ > /dev/null

      - if: always()
        run: docker compose -f compose.dev.yaml logs

      - if: always()
        run: docker compose -f compose.dev.yaml down -v
