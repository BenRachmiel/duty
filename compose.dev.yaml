services:
  backend:
    build: backend
    volumes:
      - db-data:/data
    environment:
      DATABASE_URL: "sqlite+aiosqlite:////data/duty.db"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build: frontend

  nginx:
    build: nginx
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend

volumes:
  db-data:
